<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Workspace | CODETYPO.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="html_styles.css">
     <link rel="icon" type="image/png" sizes="32x32" href="/FRONTEND/IMAGES/logo final .png">
</head>
<body>

   <header>
    <div class="header-left">
        <a href="/FRONTEND/CODE RUNNER/HOME/home_page_all_lang.html" class="exit-btn">&lt; exit</a>
        <div class="logo-text">CODETYPO<span>.html</span></div>
    </div>

    <div class="header-actions">
        <button onclick="HTMLEditor.run()" class="btn-update">▶ UPDATE PREVIEW</button>
        <button onclick="HTMLEditor.startPractice()" class="btn-practice">⚡ PRACTICE</button>
        <button onclick="HTMLEditor.printPDF()" class="btn-print">⎙ PRINT PDF</button>>
    </div>

    <div class="header-status">STATUS: ACTIVE</div>
</header>

<!-- UPDATED MODAL WITH FILE UPLOAD -->
<div id="filename-modal" class="custom-modal-overlay">
    <div class="custom-modal">
        <h3>Create New File</h3>
        
        <div class="modal-section">
            <p>Enter a name for your new HTML page:</p>
            <input type="text" id="new-filename-input" placeholder="e.g., index.html" spellcheck="false">
            <button class="btn-create" onclick="HTMLEditor.confirmAddTab()">Create Empty File</button>
        </div>

        <div class="modal-divider"><span>OR</span></div>

        <div class="modal-section">
            <p>Upload a file from your system:</p>
            <label for="system-file-upload" class="custom-file-upload">
                📁 Choose HTML File
            </label>
            <input type="file" id="system-file-upload" accept=".html,.txt,.css" onchange="HTMLEditor.handleFileUpload(event)">
        </div>

        <div class="modal-btns">
            <button class="btn-cancel" onclick="HTMLEditor.closeModal()">Cancel</button>
        </div>
    </div>
</div>

    <main class="main-content">
        <!-- LEFT: EDITOR -->
        <div class="panel">
            <div class="panel-header">
                <div style="display:flex; gap:8px;">
                    <div style="width:12px; height:12px; border-radius:50%; background:#f43f5e;"></div>
                    <div style="width:12px; height:12px; border-radius:50%; background:#fbbf24;"></div>
                    <div style="width:12px; height:12px; border-radius:50%; background:#10b981;"></div>
                </div>
                <span style="font-size:12px; color:#F97316; font-family:'Fira Code';">SOURCE_CODE</span>
            </div>
            
            <div class="tabs-bar">
                <div id="tabs-list" style="display:flex;"></div>
                <div class="add-btn" onclick="HTMLEditor.addTab()">+</div>
            </div>

            <textarea id="code-editor" spellcheck="false"></textarea>
        </div>

        <!-- RIGHT: PREVIEW -->
        <div class="panel panel-preview" id="preview-panel">
            <div class="panel-header">
                <span style="font-size:12px; font-family:'Fira Code';color: #F97316">LIVE_RENDER</span>
                <button class="icon-btn" onclick="HTMLEditor.toggleFS()" id="fs-icon-container">
                    <!-- Maximize Icon Initial -->
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
            </div>
            <iframe id="live-preview"></iframe>
        </div>
        <!-- Custom Filename Modal -->
            <div id="filename-modal" class="custom-modal-overlay">
             <div class="custom-modal">
                 <h3>Create New File</h3>
                  <p>Enter a name for your new HTML page:</p>
                     <input type="text" id="new-filename-input" placeholder="e.g., about.html" spellcheck="false">
             <div class="modal-btns">
              <button class="btn-cancel" onclick="HTMLEditor.closeModal()">Cancel</button>
              <button class="btn-create" onclick="HTMLEditor.confirmAddTab()">Create File</button>
             </div>
            </div>
          </div>

          <!-- CUSTOM PRINT MODAL -->
<div id="print-modal" class="custom-modal-overlay" style="display: none;">
    <div class="custom-modal">
        <h3>Print Project Report</h3>
        <p>Enter your name to include as the author of this document:</p>
        
        <input type="text" id="pdf-username-input" placeholder="e.g., Alex Johnson" spellcheck="false">
        
        <div class="modal-btns">
            <button class="btn-cancel" onclick="HTMLEditor.closePrintModal()">Cancel</button>
            <button class="btn-create" style="background:#facc15; color:#422006;" onclick="HTMLEditor.confirmPrint()">Generate PDF</button>
        </div>
    </div>
</div>


    </main>

    <script src="html_logic.js"></script>
</body>
</html>
