<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C IDE | CODETYPO.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="compiler_styles.css">
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 20px;">
            <a href="index.html" style="color:var(--accent-blue); text-decoration:none; border:1px solid #334155; padding:5px 12px; border-radius:4px; font-family: var(--mono-font);">&lt; exit</a>
            <div class="logo">CODETYPO<span>.c</span></div>
        </div>
        
        <button class="run-btn" id="run-button">▶ RUN CODE</button>
        
        <div style="font-family: var(--mono-font); font-size: 12px; color: var(--accent-green);">
            SYSTEM: ONLINE
        </div>
    </header>

    <main class="main-content" style="display: flex; gap: 25px; padding: 30px; flex: 1;">
        <!-- PANEL 1: EDITOR -->
        <div class="panel" style="flex: 1; display: flex; flex-direction: column; background: #0b1120; border-radius: 12px; border: 1px solid #334155; overflow: hidden;">
            <div class="panel-header" style="background: #1e293b; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155;">
                <div style="display: flex; gap: 8px;">
                    <div style="width:12px; height:12px; border-radius:50%; background:#f43f5e;"></div>
                    <div style="width:12px; height:12px; border-radius:50%; background:#fbbf24;"></div>
                    <div style="width:12px; height:12px; border-radius:50%; background:#10b981;"></div>
                </div>
                <span style="font-family: 'Fira Code'; font-size: 12px; color: #94a3b8;">main.c</span>
            </div>
            <textarea id="code-editor" spellcheck="false">#include <stdio.h>

int main() {
    int age;
    printf("Enter your age: ");
    scanf("%d", &age);
    printf("You are %d years old.\n", age);
    return 0;
}</textarea>
        </div>

        <!-- PANEL 2: TERMINAL -->
        <div class="panel" style="flex: 1; display: flex; flex-direction: column; background: #000; border-radius: 12px; border: 1px solid #334155; overflow: hidden;">
            <div class="panel-header" style="background: #1e293b; padding: 10px 20px; color: #fff; font-family: 'Fira Code'; font-size: 12px; border-bottom: 1px solid #334155;">
                TERMINAL
            </div>
            <div id="output-console" style="flex: 1; padding: 20px; color: #10b981; font-family: 'Fira Code'; font-size: 15px; overflow-y: auto; line-height: 1.5;">
                Click RUN to compile code...
            </div>
        </div>
    </main>

    <script src="compiler_logic.js"></script>
</body>
</html>
