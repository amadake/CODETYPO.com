<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C IDE | CODETYPO</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="compiler_styles.css">
</head>
<body>

    <header>
        <div class="header-left">
            <a href="#" class="exit-btn">&lt; exit</a>
            <div class="logo">CODETYPO<span>.c</span></div>
        </div>
        
        <div class="header-actions">
            <button onclick="Compiler.run()" class="btn-update">▶ RUN CODE</button>
            <button class="btn-practice">⚡ PRACTICE</button>
            <button onclick="Printer.openModal()" class="btn-print">⎙ PRINT PDF</button>
        </div>
        
        <div class="header-status">STATUS: <span style="color:var(--accent-green)">ACTIVE</span></div>
    </header>

    <main class="main-content">
        <!-- LEFT PANEL: EDITOR -->
        <div class="panel">
            <div class="panel-header">
                <div class="header-controls">
                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                </div>
                
                <!-- TAB SYSTEM -->
                <div class="tab-bar" id="tab-bar">
                    <div class="tab active" onclick="TabManager.switchTab(0)">
                        <span class="tab-name">main.c</span>
                    </div>
                    <button class="add-tab-btn" onclick="FileManager.openNewFileModal()">+</button>
                </div>

                <span class="panel-label">SOURCE_CODE</span>
            </div>
            <textarea id="code-editor" spellcheck="false">#include <stdio.h>

int main() {
    printf("Hello Codetypo!");
    return 0;
}</textarea>
        </div>

        <!-- RIGHT PANEL: TERMINAL -->
        <div class="panel">
            <div class="panel-header">
                <span class="panel-label" style="margin-left: 0;">TERMINAL_OUTPUT</span>
                <div class="expand-icon">⛶</div>
            </div>
            <div id="output-console">Click RUN to compile code...</div>
        </div>
    </main>

    <!-- NEW FILE / UPLOAD MODAL (Matched to your screenshot) -->
    <div id="file-modal" class="modal">
        <div class="modal-content themed-modal">
            <h2 class="modal-title">Create New File</h2>
            <p class="modal-subtitle">Enter a name for your new C file:</p>
            
            <input type="text" id="new-file-name" class="modal-input" placeholder="filename.c">
            
            <button onclick="FileManager.createNewFile()" class="modal-action-btn">Create Empty File</button>
            
            <div class="modal-separator">OR</div>
            
            <p class="modal-subtitle">Upload a file from your system:</p>
            <label class="upload-dropzone">
                <input type="file" id="file-upload" hidden onchange="FileManager.handleUpload(this)">
                <span class="folder-icon">📁</span> Choose C File
            </label>

            <button onclick="FileManager.closeModal()" class="modal-cancel">Cancel</button>
        </div>
    </div>

    <!-- PRINT MODAL (Matched Theme) -->
    <div id="print-modal" class="modal">
        <div class="modal-content themed-modal">
            <h2 class="modal-title">Print Settings</h2>
            <p class="modal-subtitle">Select parts to include in PDF:</p>
            
            <label class="checkbox-wrapper">
                <input type="checkbox" id="print-code-check" checked>
                <span class="custom-checkbox"></span> Source Code
            </label>
            <label class="checkbox-wrapper">
                <input type="checkbox" id="print-output-check" checked>
                <span class="custom-checkbox"></span> Terminal Output
            </label>

            <button onclick="Printer.executePrint()" class="modal-action-btn" style="background: var(--accent-gold); color: black;">Generate PDF</button>
            <button onclick="Printer.closeModal()" class="modal-cancel">Cancel</button>
        </div>
    </div>

    <div id="printable-area"></div>

    <script src="compiler_logic.js"></script>
</body>
</html>
