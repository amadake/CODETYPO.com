<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice: Custom C Code | CODETYPO.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --sidebar-dark: #1e293b;
            --editor-bg: #0b1120;
            --text-ghost: #475569;
            --text-correct: #10b981;
            --text-error: #f43f5e;
            --accent-blue: #38bdf8;
            --code-yellow: #facc15;
            --key-bg: #334155;
            --mono-font: 'Fira Code', monospace;
        }

        body { 
            margin: 0; 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-dark); 
            color: #f1f5f9;
            overflow: hidden; 
        }

        /* --- START OVERLAY --- */
        #start-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-dark); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        .start-btn {
            background: var(--accent-blue); color: #0f172a; border: none; padding: 20px 60px;
            font-size: 24px; font-weight: 800; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 0 #0369a1; margin-top: 25px;
            font-family: var(--mono-font); text-transform: uppercase;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--sidebar-dark);
            color: white; padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 22px; font-weight: 800; font-family: var(--mono-font); }
        .logo span { color: var(--accent-blue); }
        .timer-box { font-size: 32px; font-family: var(--mono-font); font-weight: 700; color: var(--code-yellow); background: rgba(0,0,0,0.2); padding: 5px 20px; border-radius: 6px; }
        
        .header-right { display: flex; gap: 15px; align-items: center; }
        .nav-btn { cursor: pointer; padding: 10px 15px; border-radius: 6px; font-size: 13px; font-weight: 600; background: var(--bg-dark); border: 1px solid #334155; color: white; font-family: var(--mono-font); }

        /* --- CODING AREA --- */
        .editor-container {
            max-width: 1000px; margin: 40px auto;
            background: var(--editor-bg); border-radius: 12px;
            border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        .editor-tab {
            background: var(--sidebar-dark); padding: 12px 20px;
            font-family: var(--mono-font); font-size: 12px; color: #94a3b8;
            border-bottom: 1px solid #334155; display: flex; gap: 10px;
        }

        .code-area { 
            padding: 40px; font-family: var(--mono-font); font-size: 24px; 
            line-height: 1.6; white-space: pre-wrap; height: 380px;
            overflow-y: scroll; scrollbar-width: none;
        }
        .code-area::-webkit-scrollbar { display: none; }

        .char { color: var(--text-ghost); position: relative; transition: color 0.1s; }
        .char.correct { color: var(--text-correct); }
        .char.incorrect { color: var(--text-error); background: rgba(244, 63, 94, 0.2); border-radius: 2px; }
        .char.current::after { content: ""; position: absolute; left: 0; bottom: -2px; width: 100%; height: 3px; background: var(--accent-blue); animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- KEYBOARD --- */
        .kb-container { text-align: center; margin-top: 10px; padding-bottom: 40px;}
        .keyboard { background: #1e293b; padding: 15px; border-radius: 12px; display: inline-block; border: 1px solid #334155; }
        .kb-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 6px; }
        .key { background: var(--key-bg); width: 52px; height: 52px; border-radius: 6px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 11px; font-weight: 600; color: #94a3b8; box-shadow: 0 3px 0 #0f172a; font-family: var(--mono-font); position: relative; }
        .key .top-char { font-size: 14px; color: #cbd5e1; }
        .key.active { background: var(--accent-blue) !important; color: #0f172a !important; transform: translateY(2px); box-shadow: 0 0 15px var(--accent-blue); }
        .key.wide { width: 90px; }
        .key.space { width: 380px; }

        #pause-indicator { position: fixed; bottom: 30px; right: 30px; background: rgba(30, 41, 59, 0.95); border: 1px solid var(--accent-blue); padding: 15px 25px; border-radius: 8px; display: none; align-items: center; gap: 15px; z-index: 3000; }
        .pause-dot { width: 12px; height: 12px; background: var(--code-yellow); border-radius: 50%; box-shadow: 0 0 15px var(--code-yellow); animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<div id="start-overlay">
    <div style="font-family: var(--mono-font); color: var(--text-correct); margin-bottom: 10px;">> mounting_custom_file.c</div>
    <h1 style="font-size: 48px; margin: 0;">Language: C (Custom Practice)</h1>
    <button class="start-btn" onclick="startGame()">Start Typing Session</button>
</div>

<header>
    <div class="header-left" style="display: flex; align-items: center; gap: 20px;">
        <a href="upload_page.html" style="color:var(--accent-blue); text-decoration:none; border:1px solid #334155; padding:5px 12px; border-radius:4px; font-family: var(--mono-font);">&lt; back to upload</a>
        <div class="logo">CODETYPO<span>.com</span></div>
    </div>
    <div class="timer-box" id="timer">05:00</div>
    <div class="header-right">
        <div class="nav-btn" onclick="location.reload()">~/reset</div>
    </div>
</header>

<div class="editor-container">
    <div class="editor-tab">
        <span style="color: #fbbf24;">●</span>
        <span style="color: #10b981;">●</span>
        <span style="color: #f43f5e;">●</span>
        <span id="tab-name" style="margin-left: 10px;">custom_logic.c</span>
    </div>
    <div id="code-display" class="code-area"></div>
    <input type="text" id="hidden-input" style="position: absolute; opacity: 0;" autofocus>
</div>

<div class="kb-container"><div class="keyboard" id="visual-keyboard"></div></div>

<div id="pause-indicator"><div class="pause-dot"></div><div>STATUS: PAUSED</div></div>

<script>
    // 1. GET THE UPLOADED CODE FROM LOCAL STORAGE
    const cCode = localStorage.getItem('customPracticeCode') || "#include <stdio.h>\nint main() {\n  printf(\"No file uploaded\");\n  return 0;\n}";
    const fileName = localStorage.getItem('customFileName') || "practice.c";
    document.getElementById('tab-name').innerText = fileName;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    let currentIndex = 0;
    let timeLeft = 300;
    let timerId = null;
    let totalErrors = 0;
    let inactivityTimer = null;

    const layouts = {
        US: [
            ["~ `","! 1","@ 2","# 3","$ 4","% 5","^ 6","& 7","* 8","( 9",") 0","_ -","+ =","back"],
            ["tab","Q","W","E","R","T","Y","U","I","O","P","{ [","} ]","| \\"],
            ["caps","A","S","D","F","G","H","J","K","L",": ;","\" '","enter"],
            ["shift","Z","X","C","V","B","N","M","< ,","> .","? /","shift"],
            ["space"]
        ]
    };

    function startGame() {
        document.getElementById('start-overlay').style.display = 'none';
        document.getElementById('hidden-input').focus();
        setupText();
        initKeyboard();
    }

    function setupText() {
        const display = document.getElementById('code-display');
        [...cCode].forEach(c => {
            const s = document.createElement('span');
            s.className = 'char';
            s.textContent = c === '\n' ? '↵\n' : c;
            display.appendChild(s);
        });
        updateState();
    }

    function initKeyboard() {
        const kb = document.getElementById('visual-keyboard');
        layouts.US.forEach(row => {
            const rDiv = document.createElement('div');
            rDiv.className = 'kb-row';
            row.forEach(keyStr => {
                const k = document.createElement('div');
                k.className = 'key';
                const parts = keyStr.split(' ');
                k.dataset.char = (keyStr === 'space' ? 'SPACE' : parts[parts.length-1].toUpperCase());
                k.textContent = parts[parts.length-1].toUpperCase();
                if(['BACK','TAB','CAPS','ENTER','SHIFT'].includes(k.textContent)) k.classList.add('wide');
                if(keyStr === 'space') { k.classList.add('space'); k.textContent = ''; }
                rDiv.appendChild(k);
            });
            kb.appendChild(rDiv);
        });
    }

    function updateState() {
        const spans = document.querySelectorAll('.char');
        if(currentIndex >= cCode.length) {
            clearInterval(timerId);
            alert("Custom Level Complete!");
            window.location.href = "practice_home.html";
            return;
        }
        spans.forEach((s, i) => s.classList.toggle('current', i === currentIndex));
        const currentSpan = spans[currentIndex];
        if (currentSpan) currentSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });
        
        document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
        const target = cCode[currentIndex].toUpperCase();
        document.querySelectorAll('.key').forEach(k => {
            if(k.dataset.char === target || (cCode[currentIndex] === '\n' && k.dataset.char === 'ENTER') || (cCode[currentIndex] === ' ' && k.dataset.char === 'SPACE')) k.classList.add('active');
        });
    }

    window.addEventListener('keydown', (e) => {
        if(document.getElementById('start-overlay').style.display !== 'none') return;
        if(e.key === ' ' || e.key === 'Tab') e.preventDefault();
        
        document.getElementById('pause-indicator').style.display = 'none';
        clearTimeout(inactivityTimer);
        
        if(!timerId) {
            timerId = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').textContent = `${m}:${s<10?'0':''}${s}`;
            }, 1000);
        }

        inactivityTimer = setTimeout(() => { document.getElementById('pause-indicator').style.display = 'flex'; }, 5000);

        const typed = e.key === 'Enter' ? '\n' : e.key;
        const spans = document.querySelectorAll('.char');

        if(e.key === 'Backspace' && currentIndex > 0) {
            spans[currentIndex].className = 'char';
            currentIndex--;
        } 
        else if(currentIndex < cCode.length) {
            if(typed === cCode[currentIndex]) {
                playSound(600, 'sine', 0.05);
                spans[currentIndex].classList.add('correct');
                currentIndex++;
                // Skip indentation
                while(cCode[currentIndex] === ' ' && cCode[currentIndex-1] === '\n') {
                    spans[currentIndex].classList.add('correct');
                    currentIndex++;
                }
            } else if(e.key.length === 1 || e.key === 'Enter') {
                totalErrors++;
                playSound(150, 'square', 0.1);
                spans[currentIndex].classList.add('incorrect');
            }
        }
        updateState();
    });
</script>
</body>
</html>
