<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Session | CODETYPO.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --sidebar-dark: #1e293b;
            --editor-bg: #0b1120;
            --text-ghost: #475569;
            --text-correct: #10b981;
            --text-error: #f43f5e;
            --accent-blue: #38bdf8;
            --code-yellow: #facc15;
            --key-bg: #334155;
            --mono-font: 'Fira Code', monospace;
        }

        body { 
            margin: 0; font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-dark); color: #f1f5f9;
            overflow: hidden; 
        }

        /* --- START OVERLAY --- */
        #start-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-dark); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        .start-btn {
            background: var(--accent-blue); color: #0f172a; border: none; padding: 20px 60px;
            font-size: 24px; font-weight: 800; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 0 #0369a1; margin-top: 25px;
            font-family: var(--mono-font); text-transform: uppercase;
        }

        header {
            background-color: var(--sidebar-dark); padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 22px; font-weight: 800; font-family: var(--mono-font); text-decoration: none; color: white; }
        .logo span { color: var(--accent-blue); }
        .timer-box { font-size: 32px; font-family: var(--mono-font); font-weight: 700; color: var(--code-yellow); background: rgba(0,0,0,0.2); padding: 5px 20px; border-radius: 6px; }
        
        .nav-btn { cursor: pointer; padding: 10px 15px; border-radius: 6px; font-size: 13px; font-weight: 600; background: var(--bg-dark); border: 1px solid #334155; color: white; font-family: var(--mono-font); }

        .editor-container {
            max-width: 1100px; margin: 25px auto;
            background: var(--editor-bg); border-radius: 12px;
            border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .editor-tab {
            background: var(--sidebar-dark); padding: 12px 20px;
            font-family: var(--mono-font); font-size: 12px; color: #94a3b8;
            border-bottom: 1px solid #334155; display: flex; gap: 10px;
        }

        .code-area { 
            padding: 40px; font-family: var(--mono-font); font-size: 22px; 
            line-height: 1.6; white-space: pre-wrap; height: 300px;
            overflow-y: scroll; scrollbar-width: none;
        }

        .char { color: var(--text-ghost); position: relative; }
        .char.correct { color: var(--text-correct); }
        .char.incorrect { color: var(--text-error); background: rgba(244, 63, 94, 0.2); border-radius: 2px; }
        .char.current::after { 
            content: ""; position: absolute; left: 0; bottom: -2px; 
            width: 100%; height: 3px; background: var(--accent-blue); 
            animation: blink 0.8s infinite; 
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- KEYBOARD STYLES --- */
        .kb-container { text-align: center; margin-top: 10px; padding-bottom: 20px; }
        .keyboard { background: #1e293b; padding: 12px; border-radius: 12px; display: inline-block; border: 1px solid #334155; }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 4px; }
        
        .key { 
            background: var(--key-bg); width: 48px; height: 48px; border-radius: 6px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 11px; font-weight: 600; color: #94a3b8; box-shadow: 0 3px 0 #0f172a; 
            font-family: var(--mono-font); transition: 0.05s;
        }

        /* The specific highlight for the NEXT key to press */
        .key.active-target { 
            border: 2px solid var(--accent-blue); 
            color: var(--accent-blue); 
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
            transform: scale(1.05);
        }

        /* Visual feedback when any key is pressed */
        .key.pressed { 
            background: var(--accent-blue) !important; 
            color: #0f172a !important; 
            transform: translateY(2px); 
            box-shadow: none; 
        }

        .key.wide { width: 80px; }
        .key.space { width: 300px; }

        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000;
        }
        .modal { background: var(--sidebar-dark); width: 350px; border-radius: 12px; padding: 30px; border: 1px solid var(--accent-blue); }
        #pause-indicator { position: fixed; bottom: 30px; right: 30px; background: rgba(30, 41, 59, 0.95); border: 1px solid var(--accent-blue); padding: 15px 25px; border-radius: 8px; display: none; align-items: center; gap: 15px; }
    </style>
</head>
<body>

<div id="start-overlay">
    <div style="font-family: var(--mono-font); color: var(--text-correct); margin-bottom: 10px;">> mounting_custom_code.sh</div>
    <h1 style="font-size: 40px; margin: 0;">Practice Session</h1>
    <button class="start-btn" onclick="startGame()">Initialize Session</button>
</div>

<header>
    <div style="display: flex; align-items: center; gap: 20px;">
        <a href="upload_page.html" class="nav-btn" style="text-decoration:none;">&lt; exit</a>
        <div class="logo">CODETYPO<span>.com</span></div>
    </div>
    <div class="timer-box" id="timer">05:00</div>
    <div style="display: flex; gap: 15px;">
        <div class="nav-btn" onclick="location.reload()">~/reset</div>
        <div class="nav-btn" onclick="toggleModal(true)">audio_cfg</div>
    </div>
</header>

<div class="editor-container">
    <div class="editor-tab">
        <span style="color: #fbbf24;">●</span><span style="color: #10b981;">●</span><span style="color: #f43f5e;">●</span>
        <span id="tab-name" style="margin-left: 10px;">custom_practice.c</span>
    </div>
    <div id="code-display" class="code-area"></div>
</div>

<div class="kb-container">
    <div class="keyboard" id="visual-keyboard"></div>
</div>

<!-- Sound Settings Modal -->
<div class="modal-overlay" id="sound-modal">
    <div class="modal">
        <h2 style="margin-top: 0; font-family: var(--mono-font); font-size: 18px;">Audio Configuration</h2>
        <div style="margin: 20px 0;">
            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                <input type="checkbox" id="check-click" checked> <span style="font-family: var(--mono-font); font-size: 14px;">Typing Clicks</span>
            </label>
        </div>
        <div style="margin: 20px 0;">
            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                <input type="checkbox" id="check-error" checked> <span style="font-family: var(--mono-font); font-size: 14px;">Error Beeps</span>
            </label>
        </div>
        <button class="nav-btn" style="width: 100%;" onclick="toggleModal(false)">Apply Settings</button>
    </div>
</div>

<div id="pause-indicator"><div style="width:12px;height:12px;background:var(--code-yellow);border-radius:50%"></div><div style="font-family: var(--mono-font);">STATUS: PAUSED</div></div>

<script>
    // --- 1. DATA AND MODULES ---
    const cCode = localStorage.getItem('customPracticeCode') || "#include <stdio.h>\n\nint main() {\n  printf(\"Hello World\");\n  return 0;\n}";
    const fileName = localStorage.getItem('customFileName') || "practice.c";
    
    let currentIndex = 0;
    let timerId = null;
    let timeLeft = 300;
    let inactivityTimer = null;

    // AUDIO ENGINE
    const AudioEngine = {
        ctx: null,
        init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        play(freq, type, duration) {
            this.init();
            const osc = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            g.gain.setValueAtTime(0.1, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
            osc.connect(g); g.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + duration);
        }
    };

    // KEYBOARD ENGINE
    const KeyboardEngine = {
        rows: [
            ["`", "1", "2", "3", "4", "5", "6", "7", "8", "9", "0", "-", "=", "BACK"],
            ["TAB", "Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P", "[", "]", "\\"],
            ["CAPS", "A", "S", "D", "F", "G", "H", "J", "K", "L", ";", "'", "ENTER"],
            ["SHIFT", "Z", "X", "C", "V", "B", "N", "M", ",", ".", "/", "SHIFT"],
            ["SPACE"]
        ],
        init() {
            const kb = document.getElementById('visual-keyboard');
            this.rows.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'kb-row';
                row.forEach(key => {
                    const k = document.createElement('div');
                    k.className = 'key';
                    k.textContent = key;
                    k.dataset.key = key;
                    if(["BACK","TAB","CAPS","ENTER","SHIFT"].includes(key)) k.classList.add('wide');
                    if(key === "SPACE") k.classList.add('space');
                    rowDiv.appendChild(k);
                });
                kb.appendChild(rowDiv);
            });
        },
        highlight(char) {
            document.querySelectorAll('.key').forEach(k => k.classList.remove('active-target'));
            if(!char) return;
            let target = char.toUpperCase();
            if(char === '\n') target = "ENTER";
            if(char === ' ') target = "SPACE";
            
            const el = document.querySelector(`.key[data-key="${target}"]`);
            if(el) el.classList.add('active-target');
        },
        pressEffect(key) {
            let target = key.toUpperCase();
            if(key === ' ') target = "SPACE";
            if(key === 'Enter') target = "ENTER";
            const el = document.querySelector(`.key[data-key="${target}"]`);
            if(el) {
                el.classList.add('pressed');
                setTimeout(() => el.classList.remove('pressed'), 100);
            }
        }
    };

    // --- 2. CORE GAME LOGIC ---

    function startGame() {
        document.getElementById('start-overlay').style.display = 'none';
        document.getElementById('tab-name').innerText = fileName;
        KeyboardEngine.init();
        renderCode();
        updateState();
    }

    function renderCode() {
        const display = document.getElementById('code-display');
        [...cCode].forEach(c => {
            const s = document.createElement('span');
            s.className = 'char';
            s.textContent = (c === '\n') ? '↵\n' : c;
            display.appendChild(s);
        });
    }

    function updateState() {
        const spans = document.querySelectorAll('.char');
        
        // Success check
        if(currentIndex >= cCode.length) {
            clearInterval(timerId);
            alert("Session Complete!");
            return;
        }

        // Update visual focus
        spans.forEach((s, i) => s.classList.toggle('current', i === currentIndex));
        spans[currentIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
        
        // Update Keyboard highlight for NEXT key
        KeyboardEngine.highlight(cCode[currentIndex]);
    }

    window.addEventListener('keydown', (e) => {
        if(document.getElementById('start-overlay').style.display !== 'none') return;
        
        // UI Feedback
        KeyboardEngine.pressEffect(e.key);
        document.getElementById('pause-indicator').style.display = 'none';
        clearTimeout(inactivityTimer);
        inactivityTimer = setTimeout(() => { document.getElementById('pause-indicator').style.display = 'flex'; }, 5000);

        if(e.key === 'Tab' || e.key === ' ') e.preventDefault();

        // Timer Start
        if(!timerId) {
            timerId = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').textContent = `${m}:${s<10?'0':''}${s}`;
            }, 1000);
        }

        const typed = (e.key === 'Enter') ? '\n' : e.key;
        const spans = document.querySelectorAll('.char');

        if(e.key === 'Backspace' && currentIndex > 0) {
            currentIndex--;
            spans[currentIndex].className = 'char';
        } else if(currentIndex < cCode.length) {
            if(typed === cCode[currentIndex]) {
                if(document.getElementById('check-click').checked) AudioEngine.play(600, 'sine', 0.05);
                spans[currentIndex].classList.add('correct');
                currentIndex++;
                
                // Skip auto-indent spaces for C
                while(cCode[currentIndex] === ' ' && cCode[currentIndex-1] === '\n') {
                    spans[currentIndex].classList.add('correct');
                    currentIndex++;
                }
            } else if(e.key.length === 1 || e.key === 'Enter') {
                if(document.getElementById('check-error').checked) AudioEngine.play(150, 'square', 0.1);
                spans[currentIndex].classList.add('incorrect');
            }
        }
        updateState();
    });

    function toggleModal(show) {
        document.getElementById('sound-modal').style.display = show ? 'flex' : 'none';
    }
</script>
</body>
</html>
