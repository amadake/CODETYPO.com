<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Practice Session | CODETYPO.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --sidebar-dark: #1e293b;
            --editor-bg: #0b1120;
            --text-ghost: #475569;
            --text-correct: #10b981;
            --text-error: #f43f5e;
            /* JS Brand Colors */
            --accent-js: #f7df1e; 
            --accent-js-glow: rgba(247, 223, 30, 0.3);
            --code-yellow: #facc15;
            --key-bg: #334155;
            --mono-font: 'Fira Code', monospace;
        }

        body { 
            margin: 0; font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-dark); color: #f1f5f9;
            overflow: hidden; 
        }

        /* --- START OVERLAY --- */
        #start-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-dark); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        .start-btn {
            background: var(--accent-js); color: #000; border: none; padding: 20px 60px;
            font-size: 24px; font-weight: 800; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 0 #b5a210; margin-top: 25px;
            font-family: var(--mono-font); text-transform: uppercase;
        }

        header {
            background-color: var(--sidebar-dark); padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 22px; font-weight: 800; font-family: var(--mono-font); text-decoration: none; color: white; }
        .logo span { color: var(--accent-js); }
        .timer-box { font-size: 32px; font-family: var(--mono-font); font-weight: 700; color: var(--accent-js); background: rgba(0,0,0,0.2); padding: 5px 20px; border-radius: 6px; }
        
        .nav-btn { cursor: pointer; padding: 10px 15px; border-radius: 6px; font-size: 13px; font-weight: 600; background: var(--bg-dark); border: 1px solid #334155; color: white; font-family: var(--mono-font); text-decoration: none; }

        .editor-container {
            max-width: 1100px; margin: 25px auto;
            background: var(--editor-bg); border-radius: 12px;
            border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .editor-tab {
            background: var(--sidebar-dark); padding: 12px 20px;
            font-family: var(--mono-font); font-size: 12px; color: #94a3b8;
            border-bottom: 1px solid #334155; display: flex; gap: 10px;
        }

        .code-area { 
            padding: 40px; font-family: var(--mono-font); font-size: 22px; 
            line-height: 1.6; white-space: pre-wrap; height: 350px;
            overflow-y: scroll; scrollbar-width: none;
        }

        .char { color: var(--text-ghost); position: relative; }
        .char.correct { color: var(--text-correct); }
        .char.incorrect { color: var(--text-error); background: rgba(244, 63, 94, 0.2); border-radius: 2px; }
        .char.current::after { 
            content: ""; position: absolute; left: 0; bottom: -2px; 
            width: 100%; height: 3px; background: var(--accent-js); 
            animation: blink 0.8s infinite; 
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- KEYBOARD STYLES --- */
        .kb-container { text-align: center; margin-top: 10px; padding-bottom: 20px; }
        .keyboard { background: #1e293b; padding: 12px; border-radius: 12px; display: inline-block; border: 1px solid #334155; }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 4px; }
        
        .key { 
            background: var(--key-bg); width: 48px; height: 48px; border-radius: 6px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 11px; font-weight: 600; color: #94a3b8; box-shadow: 0 3px 0 #0f172a; 
            font-family: var(--mono-font); transition: 0.05s;
        }

        .key.active-target { 
            border: 2px solid var(--accent-js); 
            color: var(--accent-js); 
            box-shadow: 0 0 10px var(--accent-js-glow);
            transform: scale(1.05);
        }

        .key.pressed { 
            background: var(--accent-js) !important; 
            color: #000 !important; 
            transform: translateY(2px); 
            box-shadow: none; 
        }

        .key.wide { width: 80px; }
        .key.space { width: 300px; }

        #pause-indicator { position: fixed; bottom: 30px; right: 30px; background: rgba(30, 41, 59, 0.95); border: 1px solid var(--accent-js); padding: 15px 25px; border-radius: 8px; display: none; align-items: center; gap: 15px; }
    </style>
</head>
<body>

<div id="start-overlay">
    <div style="font-family: var(--mono-font); color: var(--accent-js); margin-bottom: 10px;">> npm run practice:start</div>
    <h1 style="font-size: 40px; margin: 0;">JS Practice Session</h1>
    <button class="start-btn" onclick="startGame()">Initialize Session</button>
</div>

<header>
    <div style="display: flex; align-items: center; gap: 20px;">
        <a href="html_home_page.html" class="nav-btn">&lt; exit</a>
        <div class="logo">CODETYPO<span>.com</span></div>
    </div>
    <div class="timer-box" id="timer">05:00</div>
    <div style="display: flex; gap: 15px;">
        <div class="nav-btn" onclick="location.reload()">~/reset</div>
        <div class="nav-btn">WPM: <span id="wpm-val">0</span></div>
    </div>
</header>

<div class="editor-container">
    <div class="editor-tab">
        <span style="color: #fbbf24;">●</span><span style="color: #10b981;">●</span><span style="color: #f43f5e;">●</span>
        <i class="fab fa-js" style="color: var(--accent-js); margin-left: 10px;"></i>
        <span id="tab-name" style="margin-left: 5px;">script.js</span>
    </div>
    <div id="code-display" class="code-area"></div>
</div>

<div class="kb-container">
    <div class="keyboard" id="visual-keyboard"></div>
</div>

<div id="pause-indicator"><div style="width:12px;height:12px;background:var(--accent-js);border-radius:50%"></div><div style="font-family: var(--mono-font);">STATUS: PAUSED</div></div>

<script src="js_practice_logic.js"></script>
</body>
</html>
