<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Level 7: C Syntax | CODETYPO.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Link to your main CSS file -->
    <link rel="stylesheet" href="all_level.css">
    <link rel="icon" type="image/png" sizes="32x32" href="/FRONTEND/IMAGES/logo final .png">
</head>
<body>

<div id="start-overlay">
    <div style="font-family: var(--mono-font); color: var(--text-correct); margin-bottom: 10px;">> initializing_level_7.com</div>
    <h1>Language: C (Level 7)</h1>
    <button class="start-btn" onclick="startGame()">Execute Lesson</button>
</div>

<header>
    <div class="header-left" style="display: flex; align-items: center; gap: 20px;">
        <a href="index.html" class="nav-btn" style="text-decoration: none;">&lt; exit</a>
        <div class="logo">CODETYPO<span>.com</span></div>
    </div>
    
    <div class="timer-box" id="timer">03:00</div>
    
    <div class="header-right">
        <div class="nav-btn" onclick="location.reload()">~/reset</div>
        <div class="nav-btn" onclick="toggleModal('sound-modal', true)">audio_cfg</div>
    </div>
</header>

<main class="main-content">
    <div class="editor-container">
        <!-- Editor Tab with 3 Dots -->
        <div class="editor-tab">
            <div class="tab-dots">
                <div class="tab-dot" style="background: #f43f5e;"></div>
                <div class="tab-dot" style="background: #fbbf24;"></div>
                <div class="tab-dot" style="background: #10b981;"></div>
            </div>
            <div class="tab-title">CODETYPO.com</div>
        </div>
        
        <div id="code-display" class="code-area"></div>
        <input type="text" id="hidden-input" autofocus>
    </div>
    <div class="kb-container" id="visual-keyboard"></div>
</main>

<div id="pause-indicator">
    <div style="width:12px; height:12px; background:var(--code-yellow); border-radius:50%;"></div>
    <div style="font-family: var(--mono-font); font-size: 13px;">STATUS: PAUSED <br><span style="color: #64748b; font-size: 11px;">Keep typing to resume</span></div>
</div>

<div class="modal-overlay" id="sound-modal">
    <div class="modal">
        <h2>Audio Configuration</h2>
        <label style="cursor:pointer;"><input type="checkbox" checked id="s-typing"> Typing Clicks</label><br><br>
        <label style="cursor:pointer;"><input type="checkbox" checked id="s-error"> Error Beeps</label><br><br>
        <button class="nav-btn" style="width: 100%;" onclick="toggleModal('sound-modal', false)">Save & Close</button>
    </div>
</div>

<script src="/FRONTEND/KEYBOARD/keyboard.js"></script>
<script src="/FRONTEND/Audio/audio.js"></script>
<script src="all_level.js"></script>

<script>
    // INITIALIZATION FOR LEVEL 7
    GameEngine.init({
        code: `#include <stdio.h>\n\nint main() {\nint num, i = 1;\nint fact = 1;\n\nprintf("Enter a number: ");\nscanf("%d", &num);\n\nwhile(i <= num) {\nfact = fact * i;\ni++;\n}\n\nprintf("Factorial of %d = %d\\\\n", num, fact);\n\nreturn 0;\n}`,
        resultPage: "level_7_result.html",
        timeLimit: 180  // <--- Different time for this page
    });
</script>

</body>
</html>
